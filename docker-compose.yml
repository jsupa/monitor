services:
  monitor:
    image: reg.kubov.link/ezworkz/monitor:${VERSION:-latest}
    container_name: monitor-app
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/monitor}
